  theme: 'light', currentView: 'home', currentMateri: 0, isTeacher: false
};

let state = loadState();

function loadState() {
  try {
    const saved = localStorage.getItem('arkasila-state');
    if (saved) {
      const parsed = JSON.parse(saved);
      if (!parsed.user.visitedPages) parsed.user.visitedPages = [];
      if (!parsed.user.videoEvaluationsCompleted) parsed.user.videoEvaluationsCompleted = [];
      if (!parsed.students) parsed.students = [];
      if (parsed.isTeacher === undefined) parsed.isTeacher = false;
      
      const currentUserInList = parsed.students.find(s => s.id === 'current_user');
      if (!currentUserInList) {
         parsed.students.unshift({
            id: 'current_user', isCurrentUser: true, name: parsed.user.name, avatar: parsed.user.avatar,
            kelas: parsed.user.kelas, sekolah: parsed.user.sekolah, xp: parsed.user.xp,
            level: parsed.user.level, city: 'Lokal', catatanGuru: parsed.user.catatanGuru
         });
      }
      return { ...defaultState, ...parsed, user: { ...defaultState.user, ...parsed.user } };
    }
  } catch (e) { console.error('Load state error:', e); }
  
  const freshState = JSON.parse(JSON.stringify(defaultState));
  freshState.students = [
    { id: 'current_user', isCurrentUser: true, name: freshState.user.name, avatar: freshState.user.avatar,
      kelas: freshState.user.kelas, sekolah: freshState.user.sekolah, xp: freshState.user.xp,
      level: freshState.user.level, city: 'Lokal', catatanGuru: freshState.user.catatanGuru
    }
  ];
  return freshState;
}

function saveState() { 
  try { 
    const idx = state.students.findIndex(s => s.id === 'current_user');
    if (idx !== -1) {
      state.students[idx].name = state.user.name;
      state.students[idx].avatar = state.user.avatar;
      state.students[idx].kelas = state.user.kelas;
      state.students[idx].sekolah = state.user.sekolah;
      state.students[idx].xp = state.user.xp;
      state.students[idx].level = state.user.level;
      state.students[idx].catatanGuru = state.user.catatanGuru;
    }
    localStorage.setItem('arkasila-state', JSON.stringify(state)); 
  } catch (e) { console.error('Save error:', e); } 
}

function calculateLevel(xp) { const t = [0, 100, 300, 600, 1000, 1500, 2200, 3000]; let l = 1; for (let i = 0; i < t.length; i++) { if (xp >= t[i]) l = i + 1; } return l; }
function getLevelTitle(level) { return ['', 'Pemula', 'Pelajar Aktif', 'Cermelang', 'Bintang Terang', 'Sang Juara', 'Master', 'Legenda'][level] || 'Legenda'; }
function getLevelProgress(xp) { const t = [0, 100, 300, 600, 1000, 1500, 2200, 3000]; const level = calculateLevel(xp); if (level >= t.length) return { current: xp, needed: t[t.length-1], percent: 100 }; const cL = t[level - 1]; const nL = t[level]; return { current: xp - cL, needed: nL - cL, percent: ((xp - cL) / (nL - cL)) * 100 }; }
function xpForNextLevel(xp) { const t = [0, 100, 300, 600, 1000, 1500, 2200, 3000]; const l = calculateLevel(xp); return t[l] || t[t.length-1]; }

function addXP(amount, reason = '') {
  const oldLevel = state.user.level;
  state.user.xp += amount;
  state.user.level = calculateLevel(state.user.xp);
  saveState(); updateHeader();
  if (amount > 0) showToast(`+${amount} XP ${reason ? '• ' + reason : ''}`, 'success', 'fa-bolt');
  if (state.user.level > oldLevel) {
    setTimeout(() => { showToast(`Naik ke Level ${state.user.level} - ${getLevelTitle(state.user.level)}!`, 'levelup', 'fa-star'); launchConfetti(); }, 600);
  }
  checkBadges();
}

function checkBadges() {
  badgesData.forEach(badge => {

      setTimeout(() => showToast(`Badge baru: ${badge.name}!`, 'badge', 'fa-medal'), 800);
    }
  });
}

function updateStreak() {
  const today = new Date().toDateString();
  if (state.user.lastActiveDate !== today) {
    const yesterday = new Date(Date.now() - 86400000).toDateString();
    state.user.streak = (state.user.lastActiveDate === yesterday || state.user.lastActiveDate === null) ? state.user.streak + 1 : 1;
    state.user.lastActiveDate = today; saveState();
  }
}
function checkDailyMissionsReset() { const today = new Date().toDateString(); if (state.user.dailyMissionDate !== today) { state.user.missions = { materi: false, kuis: false, game: false, ai: false }; state.user.dailyMissionDate = today; saveState(); } }
function completeMission(type) { checkDailyMissionsReset(); if (!state.user.missions[type]) { state.user.missions[type] = true; saveState(); const xpMap = { materi: 30, kuis: 40, game: 30, ai: 20 }; addXP(xpMap[type], 'Misi harian'); updateMissionSidebar(); } }

}

function showToast(message, type = 'info', icon = 'fa-info-circle') {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  const colors = { success: 'bg-accent-500', error: 'bg-red-500', info: 'bg-brand-500', warning: 'bg-orange-500', badge: 'bg-gradient-to-r from-purple-500 to-pink-500', levelup: 'bg-gradient-to-r from-yellow-400 to-orange-500' };
  toast.className = `toast-enter ${colors[type] || colors.info} text-white rounded-2xl shadow-2xl p-4 flex items-center gap-3 min-w-[280px]`;
  toast.innerHTML = `<div class="w-9 h-9 rounded-full bg-white/20 flex items-center justify-center flex-shrink-0"><i class="fa-solid ${icon}"></i></div><div class="text-sm font-medium flex-1">${message}</div><button onclick="this.parentElement.classList.add('toast-exit'); setTimeout(()=>this.parentElement.remove(), 300)" class="text-white/80 hover:text-white"><i class="fa-solid fa-xmark text-sm"></i></button>`;
  container.appendChild(toast);
  setTimeout(() => { toast.classList.add('toast-exit'); setTimeout(() => toast.remove(), 300); }, 4500);
}
function launchConfetti() { const colors = ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899']; for (let i = 0; i < 50; i++) { const c = document.createElement('div'); c.className = 'confetti'; c.style.left = Math.random() * 100 + '%'; c.style.top = '-20px'; c.style.background = colors[Math.floor(Math.random() * colors.length)]; c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px'; c.style.animationDelay = Math.random() * 0.5 + 's'; document.body.appendChild(c); setTimeout(() => c.remove(), 5000); } }

function navigate(view, params = {}) {
  if (view === 'teacher' && !state.isTeacher) {
      handleTeacherAccess();
      return;
  }
  state.currentView = view;
  if (!state.user.visitedPages.includes(view)) state.user.visitedPages.push(view);
  saveState();
  document.querySelectorAll('[data-nav]').forEach(el => el.classList.remove('active'));
  const activeNav = document.querySelector(`[data-nav="${view}"]`);
  if (activeNav) activeNav.classList.add('active');
  document.querySelectorAll('.bottom-nav-item').forEach(el => el.classList.remove('active'));
  if (['home', 'materi', 'kuis', 'game', 'dashboard'].includes(view)) {
    document.querySelector(`.bottom-nav-item[onclick*="${view}"]`)?.classList.add('active');
  }
  const container = document.getElementById('view-container');
  container.innerHTML = '';
  container.classList.remove('view-enter'); void container.offsetWidth; container.classList.add('view-enter');
  switch(view) {
    case 'home': renderHome(); break;
    case 'dashboard': renderDashboard(); break;
    case 'materi': renderMateri(params); break;
    case 'video': renderVideo(); break;
    case 'kuis': renderKuis(params); break;
    case 'game': renderGame(); break;
    case 'leaderboard': renderLeaderboard(); break;
    case 'sertifikat': renderSertifikat(); break;
    case 'ai': renderAI(); break;
    case 'teacher': renderTeacher(); break;
  }
  window.scrollTo({ top: 0, behavior: 'smooth' });
  checkBadges();
}

  state.user.name = document.getElementById('edit-name').value || 'Siswa';

  state.user.kelas = document.getElementById('edit-kelas').value || '-';

function getQuestionTypeLabel(type) { return { pg: 'Pilihan Ganda', bs: 'Benar / Salah', isian: 'Isian Singkat', jodohkan: 'Menjodohkan', drag: 'Urutkan (Drag & Drop)' }[type] || type; }
function renderQuestionInput(q) {
  switch(q.type) {
    case 'pg': return `<div class="space-y-2.5">${q.options.map((opt, i) => `<button onclick="selectQuizOption(${i})" data-option="${i}" class="quiz-option w-full text-left p-4 rounded-xl border-2 border-slate-200 dark:border-slate-700 flex items-center gap-3"><span class="w-8 h-8 rounded-lg bg-slate-100 dark:bg-slate-800 flex items-center justify-center font-bold text-sm flex-shrink-0">${String.fromCharCode(65 + i)}</span><span class="text-sm sm:text-base">${opt}</span></button>`).join('')}</div>`;
    case 'bs': return `<div class="grid grid-cols-2 gap-3"><button onclick="selectQuizOption(true)" data-option="true" class="quiz-option p-6 rounded-xl border-2 border-slate-200 dark:border-slate-700 text-center"><i class="fa-solid fa-check text-3xl text-accent-500 mb-2"></i><div class="font-bold">BENAR</div></button><button onclick="selectQuizOption(false)" data-option="false" class="quiz-option p-6 rounded-xl border-2 border-slate-200 dark:border-slate-700 text-center"><i class="fa-solid fa-xmark text-3xl text-red-500 mb-2"></i><div class="font-bold">SALAH</div></button></div>`;
    case 'isian': return `<div><input type="text" id="isian-input" placeholder="Ketik jawabanmu di sini..." class="w-full p-4 rounded-xl border-2 border-slate-200 dark:border-slate-700 bg-transparent focus:border-brand-500 outline-none text-base"><p class="text-xs text-slate-500 mt-2"><i class="fa-solid fa-info-circle"></i> Tulis jawaban singkat, abaikan huruf besar/kecil</p></div>`;
    case 'jodohkan': return `<div class="grid grid-cols-2 gap-4 sm:gap-6"><div class="space-y-2.5"><div class="text-xs font-bold text-slate-500 uppercase mb-2">A</div>${q.pairs.map((p, i) => `<div onclick="selectJodohkanLeft(${i})" data-left="${i}" class="quiz-option p-3 rounded-xl border-2 border-slate-200 dark:border-slate-700 text-sm cursor-pointer">${p.left}</div>`).join('')}</div><div class="space-y-2.5"><div class="text-xs font-bold text-slate-500 uppercase mb-2">B</div>${q.pairs.map((p, i) => `<div onclick="selectJodohkanRight(${i})" data-right="${i}" class="quiz-option p-3 rounded-xl border-2 border-slate-200 dark:border-slate-700 text-sm cursor-pointer">${p.right}</div>`).join('')}</div></div><div id="jodohkan-connections" class="mt-3 text-xs text-slate-500"></div>`;
    case 'drag': return `<div><div class="text-xs text-slate-500 mb-3"><i class="fa-solid fa-hand-pointer"></i> Seret item untuk mengurutkan dari atas ke bawah</div><div id="drag-list" class="space-y-2">${q.items.map((item) => `<div draggable="true" data-id="${item.id}" class="draggable p-4 rounded-xl border-2 border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 flex items-center gap-3 cursor-grab"><i class="fa-solid fa-grip-vertical text-slate-400"></i><span class="text-sm">${item.text}</span></div>`).join('')}</div></div>`;
    default: return '';
  }
}
function setupQuestionHandlers(q) { if (q.type === 'drag') setupDragHandlers(); }
let dragSrc = null;
function setupDragHandlers() {
  const list = document.getElementById('drag-list'); if (!list) return;
  list.querySelectorAll('.draggable').forEach(item => {
    item.addEventListener('dragstart', (e) => { dragSrc = item; item.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; });
    item.addEventListener('dragend', () => { item.classList.remove('dragging'); });
    item.addEventListener('dragover', (e) => {
      e.preventDefault(); const dragging = list.querySelector('.dragging'); if (dragging === item) return;
      const rect = item.getBoundingClientRect(); const midY = rect.top + rect.height / 2;
      if (e.clientY < midY) list.insertBefore(dragging, item); else list.insertBefore(dragging, item.nextSibling);
    });
  });
}
let selectedOption = null;
let jodohkanState = { left: null, right: null, connections: [] };
function selectQuizOption(value) { if (quizState.answered) return; selectedOption = value; document.querySelectorAll('.quiz-option').forEach(el => el.classList.remove('selected')); document.querySelector(`[data-option="${value}"]`)?.classList.add('selected'); }
function selectJodohkanLeft(idx) { if (quizState.answered || jodohkanState.connections.some(c => c.left === idx)) return; jodohkanState.left = idx; document.querySelectorAll('[data-left]').forEach(el => el.classList.remove('selected')); document.querySelector(`[data-left="${idx}"]`)?.classList.add('selected'); if (jodohkanState.right !== null) addJodohkanConnection(); }
function selectJodohkanRight(idx) { if (quizState.answered || jodohkanState.connections.some(c => c.right === idx)) return; jodohkanState.right = idx; document.querySelectorAll('[data-right]').forEach(el => el.classList.remove('selected')); document.querySelector(`[data-right="${idx}"]`)?.classList.add('selected'); if (jodohkanState.left !== null) addJodohkanConnection(); }
function addJodohkanConnection() {
  jodohkanState.connections.push({ left: jodohkanState.left, right: jodohkanState.right });
  document.getElementById('jodohkan-connections').innerHTML = jodohkanState.connections.map(c => `<div class="text-xs"><span class="font-semibold text-brand-600">${quizState.questions[quizState.currentIndex].pairs[c.left].left}</span> → <span class="font-semibold text-accent-600">${quizState.questions[quizState.currentIndex].pairs[c.right].right}</span></div>`).join('');
  document.querySelectorAll('[data-left], [data-right]').forEach(el => el.classList.remove('selected'));
  jodohkanState.left = null; jodohkanState.right = null;
}
function initQuiz() {
  const shuffled = [...quizQuestions].sort(() => Math.random() - 0.5);
  shuffled.forEach(q => { if (q.type === 'pg') { const correct = q.options[q.answer]; q.options = q.options.sort(() => Math.random() - 0.5); q.answer = q.options.indexOf(correct); } });
  // Set waktu menjadi 30 menit (1800 detik) sesuai dokumen pretest
  quizState = { questions: shuffled, currentIndex: 0, correctCount: 0, answered: false, timeLeft: 1800, finished: false, userAnswers: [] };
  jodohkanState = { left: null, right: null, connections: [] }; selectedOption = null;
}
function startQuizTimer() {
  if (window.quizTimerInterval) clearInterval(window.quizTimerInterval);
  window.quizTimerInterval = setInterval(() => {
    if (!quizState || quizState.finished || quizState.answered) return;
    quizState.timeLeft--;
    const timerEl = document.getElementById('quiz-timer');
    if (timerEl) { timerEl.textContent = formatTime(quizState.timeLeft); if (quizState.timeLeft < 60) { timerEl.parentElement.classList.remove('bg-brand-100', 'dark:bg-brand-900/40', 'text-brand-600'); timerEl.parentElement.classList.add('bg-red-100', 'dark:bg-red-900/40', 'text-red-600'); } }
    if (quizState.timeLeft <= 0) { clearInterval(window.quizTimerInterval); showToast('Waktu habis!', 'warning', 'fa-clock'); finishQuiz(); }
  }, 1000);
}
function formatTime(seconds) { const m = Math.floor(seconds / 60); const s = seconds % 60; return `${m}:${s.toString().padStart(2, '0')}`; }
function submitQuizAnswer() {
  if (quizState.answered) return;
  const q = quizState.questions[quizState.currentIndex];
  let isCorrect = false, userAnswer = '';
  switch(q.type) {
    case 'pg':
      if (selectedOption === null) { showToast('Pilih jawaban dulu!', 'warning', 'fa-triangle-exclamation'); return; }
      isCorrect = selectedOption === q.answer; userAnswer = q.options[selectedOption];
      document.querySelectorAll('.quiz-option').forEach((el, i) => { el.classList.add('disabled'); if (i === q.answer) el.classList.add('correct'); else if (i === selectedOption && !isCorrect) el.classList.add('wrong'); });
      break;
    case 'bs':
      if (selectedOption === null) { showToast('Pilih jawaban dulu!', 'warning', 'fa-triangle-exclamation'); return; }
      isCorrect = selectedOption === q.answer; userAnswer = selectedOption ? 'Benar' : 'Salah';
      document.querySelectorAll('.quiz-option').forEach(el => { el.classList.add('disabled'); const val = el.dataset.option === 'true'; if (val === q.answer) el.classList.add('correct'); else if (val === selectedOption && !isCorrect) el.classList.add('wrong'); });
      break;
    case 'isian':
      const input = document.getElementById('isian-input');
      if (!input.value.trim()) { showToast('Isi jawaban dulu!', 'warning', 'fa-triangle-exclamation'); return; }
      userAnswer = input.value.trim();
      isCorrect = userAnswer.toLowerCase().replace(/[^a-z0-9\s]/g, '').trim() === q.answer.toLowerCase().replace(/[^a-z0-9\s]/g, '').trim();
      input.classList.add(isCorrect ? 'correct' : 'wrong'); input.classList.add('disabled');
      break;
    case 'jodohkan':
      if (jodohkanState.connections.length < q.pairs.length) { showToast(`Jodohkan semua ${q.pairs.length} pasangan!`, 'warning', 'fa-triangle-exclamation'); return; }
      isCorrect = jodohkanState.connections.every(c => q.pairs[c.left].right === q.pairs[c.right].right);
      userAnswer = jodohkanState.connections.map(c => `${q.pairs[c.left].left}→${q.pairs[c.right].right}`).join(', ');
      jodohkanState.connections.forEach(c => { const correct = q.pairs[c.left].right === q.pairs[c.right].right; document.querySelector(`[data-left="${c.left}"]`)?.classList.add(correct ? 'correct' : 'wrong'); document.querySelector(`[data-right="${c.right}"]`)?.classList.add(correct ? 'correct' : 'wrong'); });
      document.querySelectorAll('[data-left], [data-right]').forEach(el => el.classList.add('disabled'));
      break;
    case 'drag':
      const items = document.querySelectorAll('#drag-list .draggable');
      const userOrder = Array.from(items).map(el => el.dataset.id);
      isCorrect = JSON.stringify(userOrder) === JSON.stringify(q.correctOrder);
      userAnswer = userOrder.join(' → ');
      items.forEach(el => el.classList.add('disabled'));
      break;
  }
  quizState.answered = true;
  if (isCorrect) {
    quizState.correctCount++;
    addXP(10, 'Jawaban benar'); // Memberikan 10 XP langsung saat menjawab benar
  }
  quizState.userAnswers.push({ question: q.question, userAnswer, correct: isCorrect });
  document.getElementById('quiz-feedback').classList.remove('hidden');
  document.getElementById('quiz-feedback').innerHTML = `<div class="rounded-xl p-4 ${isCorrect ? 'bg-accent-50 dark:bg-accent-950/30 border-accent-200' : 'bg-red-50 dark:bg-red-950/30 border-red-200'} border"><div class="flex items-start gap-3"><div class="w-10 h-10 rounded-xl ${isCorrect ? 'bg-accent-500' : 'bg-red-500'} flex items-center justify-center text-white flex-shrink-0"><i class="fa-solid ${isCorrect ? 'fa-check' : 'fa-xmark'}"></i></div><div class="flex-1"><div class="font-bold ${isCorrect ? 'text-accent-700' : 'text-red-700'} mb-1">${isCorrect ? 'Jawaban Benar! 🎉' : 'Belum Tepat'}</div><div class="text-sm text-slate-700 dark:text-slate-300"><strong>Pembahasan:</strong> ${q.explanation}</div></div></div></div>`;
  document.getElementById('quiz-submit-btn').classList.add('hidden');
  document.getElementById('quiz-next-btn').classList.remove('hidden');
}
function nextQuestion() {
  if (quizState.currentIndex === quizState.questions.length - 1) { finishQuiz(); return; }
  quizState.currentIndex++; quizState.answered = false; selectedOption = null; jodohkanState = { left: null, right: null, connections: [] };

function finishQuiz() {
  if (window.quizTimerInterval) clearInterval(window.quizTimerInterval);
  quizState.finished = true;

  renderQuizResult();
}

function renderGame() {
  document.getElementById('view-container').innerHTML = `

function flipMemoryCard(idx) {
  if (!memoryGameState || memoryGameState.flipped.includes(idx) || memoryGameState.matched.includes(idx) || memoryGameState.flipped.length >= 2) return;

  if (memoryGameState.flipped.length === 2) {
    memoryGameState.moves++; document.getElementById('memory-moves').textContent = memoryGameState.moves;

      setTimeout(() => {
        document.querySelector(`[data-index="${a}"]`).classList.add('matched');
        document.querySelector(`[data-index="${b}"]`).classList.add('matched');

    }
  }
}
let tebakGameState = null;

function downloadCertificate() {
  showToast("Menyiapkan sertifikat PDF, mohon tunggu...", "info", "fa-spinner fa-spin");
  const element = document.getElementById('certificate-print');
  
  html2canvas(element, { 
    scale: 2, 
    useCORS: true, 
    backgroundColor: '#ffffff',
    logging: false
  }).then((canvas) => {
    const { jsPDF } = window.jspdf;
    const imgData = canvas.toDataURL('image/png');
    
    // Ukuran A4 Landscape
    const pdf = new jsPDF({
      orientation: 'landscape',
      unit: 'mm',
      format: 'a4'
    });
    
    const pdfWidth = pdf.internal.pageSize.getWidth();
    const pdfHeight = pdf.internal.pageSize.getHeight();
    
    const imgWidth = pdfWidth;
    const imgHeight = (canvas.height * imgWidth) / canvas.width;
    
    let heightLeft = imgHeight;
    let position = 0;
    
    pdf.addImage(imgData, 'PNG', 0, position, imgWidth, imgHeight);
    heightLeft -= pdfHeight;
    
    while (heightLeft > 0) {
      position = heightLeft - imgHeight;
      pdf.addPage();
      pdf.addImage(imgData, 'PNG', 0, position, imgWidth, imgHeight);
      heightLeft -= pdfHeight;
    }
    
    pdf.save(`Sertifikat-Arkasila-${state.user.name.replace(/\s+/g, '_')}.pdf`);
    showToast("Sertifikat berhasil diunduh!", "success", "fa-check");
  }).catch((err) => {
    console.error("Error generating PDF:", err);
    showToast("Gagal mengunduh PDF. Menggunakan alternatif cetak...", "error", "fa-xmark");
    window.print(); // Fallback ke print dialog
  });
}

function getAIResponse(message) {
  const lower = message.toLowerCase();

}

          <div class="flex-1 min-w-0">
            <div class="font-semibold text-sm ${s.isCurrentUser ? 'text-brand-600 dark:text-brand-400' : ''}">${s.name} ${s.isCurrentUser ? '(Saya)' : ''}</div>
            <div class="text-xs text-slate-500">Level ${s.level} • ${s.city || 'Indonesia'} • ${s.kelas || '-'}</div>
          </div>
          <div class="text-right hidden sm:block">
            <div class="font-bold text-sm">${s.xp}</div>
            <div class="text-[10px] text-slate-500">XP</div>
          </div>
          <button onclick="openStudentDetail('${s.id}')" class="text-brand-500 hover:text-brand-700 p-2" title="Lihat Detail"><i class="fa-solid fa-eye"></i></button>
          <button onclick="openStudentForm('${s.id}')" class="text-yellow-500 hover:text-yellow-700 p-2" title="Edit Siswa"><i class="fa-solid fa-pen"></i></button>
          ${!s.isCurrentUser ? `<button onclick="deleteStudent('${s.id}')" class="text-red-500 hover:text-red-700 p-2" title="Hapus Siswa"><i class="fa-solid fa-trash"></i></button>` : ''}
        </div>
      `).join('')}
    </div>
  </div>`;
}

function openStudentForm(id = null) {
  let student = { name: '', avatar: '', kelas: '7A', sekolah: 'SMP Nusantara', xp: 0, city: 'Jakarta', catatanGuru: '' };
  let isEdit = false;
  if (id) {
    student = state.students.find(s => s.id === id);
    if (!student) return;
    isEdit = true;
  }
  const html = `
    <div class="flex items-center justify-between mb-4">
      <h3 class="font-display text-xl font-bold">${isEdit ? 'Edit Data Siswa' : 'Tambah Siswa Baru'}</h3>
      <button onclick="closeModal()" class="text-slate-400 hover:text-slate-700"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="space-y-4">
      <div>
        <label class="text-sm font-medium text-slate-600 dark:text-slate-300">Nama Lengkap</label>
        <input type="text" id="form-name" value="${student.name}" class="w-full mt-1 p-3 rounded-xl border-2 border-slate-200 dark:border-slate-700 bg-transparent focus:border-brand-500 outline-none" placeholder="Masukkan nama siswa">
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="text-sm font-medium text-slate-600 dark:text-slate-300">Inisial Avatar</label>
          <input type="text" id="form-avatar" maxlength="2" value="${student.avatar}" class="w-full mt-1 p-3 rounded-xl border-2 border-slate-200 dark:border-slate-700 bg-transparent focus:border-brand-500 outline-none uppercase" placeholder="AB">
        </div>
        <div>
          <label class="text-sm font-medium text-slate-600 dark:text-slate-300">Kelas</label>
          <input type="text" id="form-kelas" value="${student.kelas || '7A'}" class="w-full mt-1 p-3 rounded-xl border-2 border-slate-200 dark:border-slate-700 bg-transparent focus:border-brand-500 outline-none">
        </div>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="text-sm font-medium text-slate-600 dark:text-slate-300">Sekolah</label>
          <input type="text" id="form-sekolah" value="${student.sekolah || 'SMP Nusantara'}" class="w-full mt-1 p-3 rounded-xl border-2 border-slate-200 dark:border-slate-700 bg-transparent focus:border-brand-500 outline-none">
        </div>
        <div>
          <label class="text-sm font-medium text-slate-600 dark:text-slate-300">Kota</label>
          <input type="text" id="form-city" value="${student.city || 'Jakarta'}" class="w-full mt-1 p-3 rounded-xl border-2 border-slate-200 dark:border-slate-700 bg-transparent focus:border-brand-500 outline-none">
        </div>
      </div>
      <div>
        <label class="text-sm font-medium text-slate-600 dark:text-slate-300">XP Awal</label>
        <input type="number" id="form-xp" value="${student.xp || 0}" class="w-full mt-1 p-3 rounded-xl border-2 border-slate-200 dark:border-slate-700 bg-transparent focus:border-brand-500 outline-none">
      </div>
      <div>
        <label class="text-sm font-medium text-slate-600 dark:text-slate-300">Catatan Guru</label>
        <textarea id="form-catatan" rows="2" class="w-full mt-1 p-3 rounded-xl border-2 border-slate-200 dark:border-slate-700 bg-transparent focus:border-brand-500 outline-none resize-none text-sm" placeholder="Catatan untuk siswa...">${student.catatanGuru || ''}</textarea>
      </div>
      <button onclick="saveStudent('${id || ''}')" class="w-full px-4 py-3 rounded-xl bg-gradient-to-r from-brand-500 to-accent-500 text-white font-semibold hover:shadow-lg transition">${isEdit ? 'Simpan Perubahan' : 'Tambah Siswa'}</button>
    </div>
  `;
  openModal(html);
}

function saveStudent(id = '') {
  const name = document.getElementById('form-name').value.trim();
  if (!name) { showToast('Nama tidak boleh kosong!', 'error', 'fa-exclamation'); return; }
  
  const avatar = document.getElementById('form-avatar').value.toUpperCase() || name.substring(0, 2).toUpperCase();
  const kelas = document.getElementById('form-kelas').value || '-';
  const sekolah = document.getElementById('form-sekolah').value || '-';
  const city = document.getElementById('form-city').value || '-';
  const xp = parseInt(document.getElementById('form-xp').value) || 0;
  const catatanGuru = document.getElementById('form-catatan').value.trim();
  const level = calculateLevel(xp);
  
  if (id) {
    const idx = state.students.findIndex(s => s.id === id);
    if (idx !== -1) {
      state.students[idx] = { ...state.students[idx], name, avatar, kelas, sekolah, city, xp, level, catatanGuru };
      if (id === 'current_user') {
        state.user.name = name; state.user.avatar = avatar; state.user.kelas = kelas;
        state.user.sekolah = sekolah; state.user.xp = xp; state.user.level = level; state.user.catatanGuru = catatanGuru;
        updateHeader();
      }
    }
    showToast('Data siswa diperbarui!', 'success', 'fa-check');
  } else {
    const newStudent = {
      id: 'stud_' + Date.now(), name, avatar, kelas, sekolah, city, xp, level,
      badge: 'fa-star', badgeColor: 'text-brand-500', catatanGuru
    };
    state.students.push(newStudent);
    showToast('Siswa baru ditambahkan!', 'success', 'fa-check');
  }
  saveState();
  closeModal();
  switchTeacherTab('siswa');
}

function deleteStudent(id) {
  if (id === 'current_user') {
    showToast('Akun sendiri tidak bisa dihapus!', 'warning', 'fa-triangle-exclamation');
    return;
  }
  const student = state.students.find(s => s.id === id);
  if (!student) return;
  const html = `
    <div class="text-center">
      <div class="w-16 h-16 rounded-full bg-red-100 dark:bg-red-900/40 flex items-center justify-center mx-auto mb-4">
        <i class="fa-solid fa-triangle-exclamation text-2xl text-red-500"></i>
      </div>
      <h3 class="font-display text-xl font-bold mb-2">Hapus Siswa?</h3>
      <p class="text-sm text-slate-500 mb-1">Apakah Anda yakin ingin menghapus:</p>
      <p class="font-bold text-slate-800 dark:text-white mb-5">${student.name}?</p>
      <div class="flex gap-2">
        <button onclick="closeModal()" class="flex-1 px-4 py-2.5 rounded-xl bg-slate-200 dark:bg-slate-700 font-semibold transition">Batal</button>
        <button onclick="confirmDeleteStudent('${id}')" class="flex-1 px-4 py-2.5 rounded-xl bg-red-500 text-white font-semibold hover:bg-red-600 transition">Hapus</button>
      </div>
    </div>
  `;
  openModal(html);
}

function confirmDeleteStudent(id) {
  state.students = state.students.filter(s => s.id !== id);
  saveState();
  closeModal();
  showToast('Siswa berhasil dihapus!', 'success', 'fa-trash');
  switchTeacherTab('siswa');
}

function openStudentDetail(id) {
  const s = state.students.find(st => st.id === id);
  if (!s) return;
  const materiDone = s.isCurrentUser ? state.user.completedMateri.length : Math.floor(Math.random() * (materiData.length + 1));
  const quizDone = s.isCurrentUser ? state.user.quizScores.length : Math.floor(Math.random() * 4);
  const progress = Math.min(100, Math.floor((s.xp / 1500) * 100));
  const html = `
    <div class="flex items-center justify-between mb-4">
      <h3 class="font-display text-xl font-bold">Profil & Pantauan Siswa</h3>
      <button onclick="closeModal()" class="text-slate-400 hover:text-slate-700"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="flex items-center gap-4 mb-6">
      <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-brand-500 to-accent-500 flex items-center justify-center text-white text-2xl font-bold flex-shrink-0">${s.avatar}</div>
      <div>
        <div class="font-display text-xl font-bold">${s.name}</div>
        <div class="text-sm text-slate-500">Level ${s.level} • ${s.kelas || '7A'} • ${s.sekolah || 'SMP Nusantara'}</div>
        <div class="text-xs text-accent-600 font-semibold mt-1">${s.xp} XP Total</div>
      </div>
    </div>
    <div class="grid grid-cols-3 gap-3 mb-6 text-center">
      <div class="p-3 rounded-xl bg-slate-50 dark:bg-slate-800/50">
        <div class="text-xl font-bold text-brand-600">${materiDone}/${materiData.length}</div>
        <div class="text-[10px] text-slate-500">Materi Selesai</div>
      </div>
      <div class="p-3 rounded-xl bg-slate-50 dark:bg-slate-800/50">
        <div class="text-xl font-bold text-accent-600">${quizDone}</div>
        <div class="text-[10px] text-slate-500">Kuis Dikerjakan</div>
      </div>
      <div class="p-3 rounded-xl bg-slate-50 dark:bg-slate-800/50">
        <div class="text-xl font-bold text-purple-600">${progress}%</div>
        <div class="text-[10px] text-slate-500">Progress</div>
      </div>
    </div>
    <div class="mb-4">
      <label class="text-sm font-medium text-slate-600 dark:text-slate-300">Catatan Guru (Pantauan)</label>
      <textarea id="teacher-notes" rows="3" placeholder="Tulis catatan atau evaluasi untuk siswa ini..." class="w-full mt-1 p-3 rounded-xl border-2 border-slate-200 dark:border-slate-700 bg-transparent focus:border-brand-500 outline-none resize-none text-sm">${s.catatanGuru || ''}</textarea>
    </div>
    <div class="flex gap-2">
      <button onclick="saveTeacherNotes('${s.id}')" class="flex-1 px-4 py-2.5 rounded-xl bg-brand-500 text-white font-semibold hover:bg-brand-600 transition">Simpan Catatan</button>
      <button onclick="closeModal(); openStudentForm('${s.id}')" class="px-4 py-2.5 rounded-xl bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 font-semibold hover:border-brand-300 transition"><i class="fa-solid fa-pen"></i> Edit Siswa</button>
    </div>
  `;
  openModal(html);
}

function saveTeacherNotes(id) {
  const notes = document.getElementById('teacher-notes').value;
  const idx = state.students.findIndex(s => s.id === id);
  if (idx !== -1) {
    state.students[idx].catatanGuru = notes;
    if (state.students[idx].isCurrentUser) {
      state.user.catatanGuru = notes;
    }
  }
  saveState();
  showToast('Catatan guru berhasil disimpan!', 'success', 'fa-check');
  closeModal();
}

function exportGrades(type) { showToast(`Mengekspor nilai ke ${type.toUpperCase()}...`, 'info', 'fa-download'); setTimeout(() => showToast(`File berhasil diunduh!`, 'success', 'fa-check'), 1500); }

// === NETWORK STATUS (Online/Offline Detection) ===
function updateNetworkStatus() {
  const icon = document.getElementById('network-icon');
  if (!icon) return;
  if (navigator.onLine) {
    icon.className = 'fa-solid fa-wifi text-lg text-accent-500';
  } else {
    icon.className = 'fa-solid fa-wifi-slash text-lg text-red-500';
  }
}

window.addEventListener('online', () => {
  showToast('Koneksi internet tersambung! Kamu bisa nonton video materi sekarang.', 'success', 'fa-wifi');
  updateNetworkStatus();
  if (state.currentView === 'video' || state.currentView === 'home') navigate(state.currentView);
});

window.addEventListener('offline', () => {
  showToast('Kamu sedang offline. Video materi tidak bisa diakses, tapi materi teks tetap bisa dibaca.', 'warning', 'fa-wifi');
  updateNetworkStatus();
  if (state.currentView === 'video' || state.currentView === 'home') navigate(state.currentView);
});

function checkNetworkStatus() {
  if (navigator.onLine) {
    showToast('Kamu sedang online. Semua fitur tersedia!', 'success', 'fa-wifi');
  } else {
    showToast('Kamu sedang offline. Video materi tidak bisa diakses.', 'warning', 'fa-wifi-slash');
  }
}

// === INIT ===
function init() {
  applyTheme();
  updateStreak();
  updateHeader();
  updateMissionSidebar();
  updateNetworkStatus();
  updateTeacherAccessUI();
  navigate('home');
}
init();
</script>
